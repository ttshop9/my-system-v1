<van-popup v-model:show="showWithdraw" position="bottom" round closeable :style="{ height: '80%' }">
            <div class="popup-content">
                <h3 style="text-align:center; margin-bottom: 20px;">ถอนเงิน</h3>
                
                <van-cell-group inset>
                    <van-field 
                        v-model="withdrawForm.name" 
                        label="ชื่อ-นามสกุล" 
                        placeholder="กรุณากรอกชื่อและนามสกุลจริง" 
                        input-align="right"
                    />
                    
                    <van-field
                      v-model="withdrawForm.bank"
                      is-link
                      readonly
                      label="ธนาคาร"
                      placeholder="คลิกเพื่อเลือกธนาคาร"
                      @click="showBankPicker = true"
                      input-align="right"
                    />
                    
                    <van-field 
                        v-model="withdrawForm.accountNumber" 
                        label="เลขบัญชี" 
                        placeholder="กรุณากรอกเลขบัญชีธนาคาร" 
                        type="digit" 
                        input-align="right"
                    />
                    
                    <van-field 
                        v-model="withdrawForm.amount" 
                        label="จำนวนเงิน" 
                        :placeholder="'ถอนได้สูงสุด ฿ ' + formatMoney(balance)" 
                        type="number" 
                        input-align="right"
                    />
                </van-cell-group>

                <div style="margin: 25px 15px; padding: 10px; background: #fffbe6; border-radius: 8px; font-size: 12px; color: #ed6a0c; line-height: 1.6;">
                    ⚠️ **หมายเหตุการถอนเงิน:**<br>
                    - การถอนเงินจะใช้เวลาตรวจสอบความถูกต้องของภารกิจ 15-30 นาที<br>
                    - บัญชีปลายทางต้องมีชื่อตรงกับที่ลงทะเบียนไว้เท่านั้น
                </div>

                <div style="margin: 20px 15px;">
                    <van-button block color="#000" round @click="confirmAction('ถอนเงิน')" style="height: 50px; font-size: 16px; font-weight: bold;">
                        ยืนยันการถอนเงิน
                    </van-button>
                </div>
            </div>
        </van-popup>

        <van-popup v-model:show="showBankPicker" position="bottom" round>
          <van-picker
            title="เลือกธนาคารผู้รับเงิน"
            :columns="bankColumns"
            @confirm="onBankConfirm"
            @cancel="showBankPicker = false"
          />
        </van-popup>
