<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TKSHOP PREMIUM</title>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css"/>
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <style>
        /* เปลี่ยนแค่สีวอลเปเปอร์จากดำเป็นขาว */
        body { background-color: #ffffff; color: #161823; font-family: 'Helvetica Neue', Arial, sans-serif; margin: 0; }
        
        /* คืนค่า Header และ Logo ตามต้นฉบับพี่ */
        .header-section { text-align: center; padding: 40px 0 20px 0; }
        .header-section img { width: 150px; }
        .header-title { font-weight: bold; font-size: 20px; color: #000; margin-top: 5px; }
        .header-sub { font-size: 12px; color: #8a8b91; }

        .form-container { padding: 0 32px; }

        /* คืนค่าเมนู อีเมล/เบอร์โทรศัพท์ */
        .tab-wrapper { display: flex; justify-content: center; gap: 30px; margin-bottom: 25px; border-bottom: 1px solid #f2f2f2; }
        .tab-nav { padding: 12px 0; font-size: 15px; color: #8a8b91; cursor: pointer; }
        .tab-nav.active { color: #000; font-weight: bold; border-bottom: 2px solid #fe2c55; }

        /* ปรับ Input ให้เป็นโทนสว่างแต่โครงสร้างเดิมครบ */
        .van-field { background: #f1f1f2 !important; border-radius: 4px; margin-bottom: 15px; padding: 12px 16px; }
        .van-field__control { color: #000; }
        
        /* ปุ่มสีแดง TikTok */
        .van-button--primary { background: #fe2c55; border: none; border-radius: 4px; height: 48px; font-weight: bold; font-size: 16px; margin-top: 10px; }
        
        .footer-note { text-align: center; color: #8a8b91; font-size: 12px; margin-top: 30px; }
    </style>
</head>
<body>
    <div id="app">
        <div style="position: absolute; right: 15px; top: 15px; font-size: 12px; color: #000; font-weight: bold;">
             🇹🇭 TH / 🇺🇸 EN
        </div>

        <div class="header-section">
            <img src="https://p16-va.lemon8cdn.com/tos-alisg-v-a3e477-sg/o8fA7I9AfEAnC7e8DAIBeAf8e9f2EAfADDAfA9~tplv-tej9nj120t-origin.webp" alt="Logo">
            <div class="header-title">TKSHOP PREMIUM</div>
            <div class="header-sub">Global Security Trading Center</div>
        </div>

        <div class="form-container">
            <div class="tab-wrapper">
                <div class="tab-nav" :class="{active: !isPhoneMode}" @click="isPhoneMode = false">อีเมล</div>
                <div class="tab-nav" :class="{active: isPhoneMode}" @click="isPhoneMode = true">เบอร์โทรศัพท์</div>
            </div>

            <van-field v-if="isPhoneMode" v-model="phone" placeholder="เบอร์โทรศัพท์">
                <template #left-icon>
                    <div style="display: flex; align-items: center; gap: 5px; border-right: 1px solid #ddd; padding-right: 8px; margin-right: 10px;">
                        <img src="https://flagcdn.com/w20/th.png" width="18">
                        <span style="color: #000;">+66</span>
                    </div>
                </template>
            </van-field>
            <van-field v-else v-model="email" placeholder="กรุณากรอกอีเมล" left-icon="envelop-o" />

            <van-field v-model="password" type="password" placeholder="รหัสผ่าน" left-icon="lock" />
            
            <van-field v-model="inviteCode" placeholder="ระบุรหัสแนะนำ (Invitation Code)" left-icon="friends-o" />

            <van-button block type="primary" @click="handleAction">
                ลงทะเบียนระดับพรีเมียม
            </van-button>

            <div class="footer-note">Security Powered by Global SSL Encryption</div>
        </div>
    </div>

    <script type="module">
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const isPhoneMode = ref(true);
                const phone = ref('');
                const email = ref('');
                const password = ref('');
                const inviteCode = ref('');

                const handleAction = () => {
                    vant.showLoadingToast({ message: 'กำลังดำเนินการ...', forbidClick: true });
                    // โค้ดเชื่อม Firebase เดิมของพี่
                };

                return { isPhoneMode, phone, email, password, inviteCode, handleAction };
            }
        }).use(vant).mount('#app');
    </script>
</body>
</html>
