<script setup lang="ts">
import { ref } from 'vue'
import { showToast, showDialog } from 'vant'

const balance = ref(1540.00)
const showWithdraw = ref(false)
const showBankPicker = ref(false)

// ฟอร์มถอนเงิน 4 ช่องตามที่พี่ต้องการ
const withdrawForm = ref({
  name: '',
  bank: '',
  accountNumber: '',
  amount: ''
})

const bankColumns = [
  { text: 'กสิกรไทย', value: 'K-Bank' },
  { text: 'ไทยพาณิชย์', value: 'SCB' },
  { text: 'กรุงเทพ', value: 'BBL' },
  { text: 'กรุงไทย', value: 'KTB' },
  { text: 'ออมสิน', value: 'GSB' }
]

const onBankConfirm = ({ selectedOptions }: any) => {
  withdrawForm.value.bank = selectedOptions[0].text
  showBankPicker.value = false
}

const handleWithdraw = () => {
  if (!withdrawForm.value.name || !withdrawForm.value.bank || !withdrawForm.value.accountNumber || !withdrawForm.value.amount) {
    showToast('กรุณากรอกข้อมูลให้ครบทุกช่อง')
    return
  }
  showDialog({
    title: 'ส่งคำขอสำเร็จ',
    message: 'ระบบกำลังตรวจสอบข้อมูลการถอนเงินของท่าน โปรดรอ 15-30 นาที',
  }).then(() => {
    showWithdraw.value = false
  })
}

const formatMoney = (val: number) => {
  return val.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,')
}
</script>

<template>
  <div class="main-page">
    <div class="header-nav">
      <span class="logo">TikTok<span class="red">Shop</span></span>
      <van-icon name="setting-o" size="20" />
    </div>

    <div class="balance-card">
      <div class="label">ยอดเงินคงเหลือสะสม (THB)</div>
      <div class="amount">฿ {{ formatMoney(balance) }}</div>
      <div class="btn-group">
        <div class="btn white">เติมเงิน</div>
        <div class="btn red" @click="showWithdraw = true">ถอนเงิน</div>
      </div>
    </div>

    <van-grid :column-num="4" :border="false" class="menu-grid">
      <van-grid-item icon="records-o" text="ประวัติงาน" />
      <van-grid-item icon="balance-o" text="กระเป๋าเงิน" />
      <van-grid-item icon="friends-o" text="เชิญเพื่อน" />
      <van-grid-item icon="warn-o" text="เกี่ยวกับเรา" />
    </van-grid>

    <div class="mission-title">ภารกิจวันนี้</div>
    <div v-for="i in 3" :key="i" class="mission-item">
      <div class="m-info">
        <div class="m-icon"><van-icon name="shopping-cart" color="#fff" /></div>
        <div class="m-text">
          <div class="m-name">ภารกิจโปรโมทสินค้าที่ {{ i }}</div>
          <div class="m-desc">ค่าคอมมิชชั่น: 15% - 25%</div>
        </div>
      </div>
      <van-button size="small" type="danger" round @click="showWithdraw = true">รับงาน</van-button>
    </div>

    <van-popup v-model:show="showWithdraw" position="bottom" round closeable :style="{ height: '80%' }">
      <div class="popup-inner">
        <h3>แจ้งถอนเงิน</h3>
        <van-cell-group inset>
          <van-field v-model="withdrawForm.name" label="ชื่อ-นามสกุล" placeholder="กรอกชื่อจริง" input-align="right" />
          <van-field v-model="withdrawForm.bank" is-link readonly label="ธนาคาร" placeholder="เลือกธนาคาร" @click="showBankPicker = true" input-align="right" />
          <van-field v-model="withdrawForm.accountNumber" label="เลขบัญชี" placeholder="ระบุเลขบัญชี" type="digit" input-align="right" />
          <van-field v-model="withdrawForm.amount" label="จำนวนเงิน" placeholder="ยอดที่ต้องการถอน" type="number" input-align="right" />
        </van-cell-group>
        <div class="notice-box">
          * การถอนเงินจะใช้เวลาตรวจสอบ 15-30 นาที<br>
          * บัญชีปลายทางต้องตรงกับชื่อที่ระบุเท่านั้น
        </div>
        <div style="padding: 20px;">
          <van-button block color="#000" round @click="handleWithdraw">ยืนยันการถอนเงิน</van-button>
        </div>
      </div>
    </van-popup>

    <van-popup v-model:show="showBankPicker" position="bottom" round>
      <van-picker title="เลือกธนาคาร" :columns="bankColumns" @confirm="onBankConfirm" @cancel="showBankPicker = false" />
    </van-popup>
  </div>
</template>
