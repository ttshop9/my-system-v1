<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Shop - Work Platform</title>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css"/>
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <style>
        body { background-color: #f0f2f5; margin: 0; font-family: -apple-system, sans-serif; }
        .header-box { background: #000; color: #fff; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
        .balance-section { 
            background: linear-gradient(135deg, #1a1a1a, #4a4a4a); 
            margin: 15px; padding: 25px; border-radius: 15px; color: #fff;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        .balance-amount { font-size: 36px; font-weight: bold; margin: 10px 0; color: #25f4ee; }
        .withdraw-btn { background: #fe2c55; border: none; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .popup-content { padding: 20px; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header-box">
            <span style="font-weight: bold; font-size: 20px;">TikTok<span style="color:#fe2c55">Shop</span></span>
            <van-icon name="setting-o" size="22"></van-icon>
        </div>

        <div class="balance-section">
            <div style="font-size: 14px; opacity: 0.8;">ยอดเงินคงเหลือสะสม (THB)</div>
            <div class="balance-amount">฿ {{ formatMoney(balance) }}</div>
            <div style="display: flex; gap: 12px; margin-top: 15px;">
                <button class="withdraw-btn" style="background: #fff; color: #000;" @click="showRecharge = true">เติมเงิน</button>
                <button class="withdraw-btn" @click="showWithdraw = true">ถอนเงิน</button>
            </div>
        </div>

        <div style="padding: 10px 15px; font-weight: bold; color: #333;">ภารกิจประจำวัน</div>
        <div v-for="i in 3" :key="i" style="background:#fff; margin:10px 15px; padding:15px; border-radius:10px; display:flex; justify-content:space-between; align-items:center;">
            <span>ภารกิจโปรโมทสินค้าที่ {{i + 500}}</span>
            <van-button size="small" type="primary" color="#fe2c55" round @click="showWithdraw = true">รับงาน</van-button>
        </div>

        <van-popup v-model:show="showWithdraw" position="bottom" round closeable :style="{ height: '80%' }">
            <div class="popup-content">
                <h3 style="text-align:center; margin-bottom: 20px;">แจ้งถอนเงิน</h3>
                <van-cell-group inset>
                    <van-field v-model="withdrawForm.name" label="ชื่อ-นามสกุล" placeholder="กรุณากรอกชื่อจริง" input-align="right" />
                    <van-field v-model="withdrawForm.bank" is-link readonly label="ธนาคาร" placeholder="เลือกธนาคาร" @click="showBankPicker = true" input-align="right" />
                    <van-field v-model="withdrawForm.accountNumber" label="เลขบัญชี" placeholder="ระบุเลขบัญชี" type="digit" input-align="right" />
                    <van-field v-model="withdrawForm.amount" label="จำนวนเงิน" placeholder="ยอดเงินที่ถอน" type="number" input-align="right" />
                </van-cell-group>
                <div style="margin: 25px 15px; font-size: 12px; color: #ee0a24;">* หมายเหตุ: บัญชีปลายทางต้องมีชื่อตรงกับที่ระบุไว้เท่านั้น</div>
                <div style="margin: 20px 15px;">
                    <van-button block color="#000" round @click="confirmAction('ถอนเงิน')">ยืนยันการถอนเงิน</van-button>
                </div>
            </div>
        </van-popup>

        <van-popup v-model:show="showRecharge" position="bottom" round closeable :style="{ height: '65%' }">
