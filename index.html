<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TKSHOP - Real System</title>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css"/>
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf2BfaGTs6qQD3MO5tSZLLW-BuQFvDVwM",
            authDomain: "my-trading-db.firebaseapp.com",
            projectId: "my-trading-db",
            storageBucket: "my-trading-db.firebasestorage.app",
            messagingSenderId: "682968234759",
            appId: "1:682968234759:web:eb2978d1e4019b77cb23a2"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // --- ส่วนของ Vue App ---
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const currPage = ref('login');
                const userForm = ref({ name: '', pass: '' });
                const userData = ref({ balance: 0, status: 'pending' });

                // ฟังก์ชันสมัครสมาชิก (เดินจริง: ส่งข้อมูลเข้า DB)
                const doRegister = async () => {
                    if(!userForm.value.name) return vant.showToast('กรุณากรอกชื่อ');
                    await setDoc(doc(db, "users", userForm.value.name), {
                        pass: userForm.value.pass,
                        balance: 0,
                        status: 'pending', // รอพี่กดอนุมัติ
                        createdAt: new Date()
                    });
                    vant.showDialog({ title: 'สำเร็จ', message: 'สมัครแล้ว! รอแอดมินอนุมัติ' });
                };

                // ฟังก์ชันเข้าสู่ระบบ (เดินจริง: เช็กกับ DB)
                const doLogin = async () => {
                    const docRef = doc(db, "users", userForm.value.name);
                    const docSnap = await getDoc(docRef);
                    
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if(data.pass === userForm.value.pass) {
                            if(data.status === 'active') {
                                userData.value = data;
                                currPage.value = 'home';
                            } else {
                                vant.showDialog({ message: 'บัญชีนี้ยังไม่ได้รับอนุมัติ' });
                            }
                        } else {
                            vant.showToast('รหัสผ่านผิด');
                        }
                    } else {
                        vant.showToast('ไม่พบผู้ใช้งาน');
                    }
                };

                return { currPage, userForm, userData, doRegister, doLogin };
            }
        }).use(vant).mount('#app');
    </script>
</head>
<body>
    <div id="app">
        <div v-if="currPage === 'login'" style="padding: 20px;">
            <h2 style="text-align:center;">TikTok<span style="color:red;">Shop</span></h2>
            <van-tabs color="#fe2c55">
                <van-tab title="เข้าสู่ระบบ">
                    <van-field v-model="userForm.name" label="ชื่อผู้ใช้" placeholder="Username"></van-field>
                    <van-field v-model="userForm.pass" type="password" label="รหัสผ่าน" placeholder="Password"></van-field>
                    <van-button block color="#000" @click="doLogin" style="margin-top:20px;">เข้าสู่ระบบ</van-button>
                </van-tab>
                <van-tab title="สมัครสมาชิก">
                    <van-field v-model="userForm.name" label="ชื่อผู้ใช้" placeholder="Username"></van-field>
                    <van-field v-model="userForm.pass" type="password" label="รหัสผ่าน" placeholder="Password"></van-field>
                    <van-button block color="#fe2c55" @click="doRegister" style="margin-top:20px;">ลงทะเบียน</van-button>
                </van-tab>
            </van-tabs>
        </div>

        <div v-if="currPage === 'home'">
            <van-nav-bar title="หน้าหลัก"></van-nav-bar>
            <div style="padding:20px; background:#333; color:#fff; margin:15px; border-radius:15px;">
                <p>ยอดเงินคงเหลือ (USD)</p>
                <h1>$ {{ userData.balance.toFixed(2) }}</h1>
            </div>
            <p style="text-align:center; color:#999;">นี่คือข้อมูลจริงจากฐานข้อมูลของพี่</p>
        </div>
    </div>
</body>
</html>
