<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Shop - Seller Center</title>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css"/>
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <style>
        /* ปรับพื้นหลังให้ขาวคลีนเหมือนแอปจริง */
        body { background-color: #ffffff; color: #161823; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; }
        
        .header-logo { text-align: center; padding: 50px 0 30px 0; }
        .header-logo img { width: 140px; }

        .auth-container { padding: 0 40px; }
        
        /* แถบเมนู เลือกเข้าสู่ระบบ/สมัครสมาชิก */
        .tab-menu { display: flex; justify-content: space-around; margin-bottom: 30px; position: relative; }
        .tab-item { font-size: 16px; color: #8a8b91; padding-bottom: 8px; cursor: pointer; }
        .tab-item.active { color: #161823; font-weight: bold; border-bottom: 2px solid #fe2c55; }

        /* ช่อง Input แบบเรียบๆ */
        .van-field { background: #f8f8f8; border-radius: 2px; margin-bottom: 12px; padding: 10px 15px; border: none; }
        .van-field__control { font-size: 15px; }
        
        /* ปุ่มสีแดงอันเป็นเอกลักษณ์ของ TikTok */
        .van-button--primary { background: #fe2c55; border: none; border-radius: 4px; height: 46px; font-weight: bold; font-size: 16px; }
        
        .footer-text { text-align: center; color: #fe2c55; font-size: 13px; margin-top: 25px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header-logo">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/5/5a/TikTok_Shop_logo.svg/1280px-TikTok_Shop_logo.svg.png" alt="TikTok Shop">
        </div>

        <div class="auth-container">
            <div class="tab-menu">
                <div class="tab-item" :class="{active: isLogin}" @click="isLogin = true">เข้าสู่ระบบ</div>
                <div class="tab-item" :class="{active: !isLogin}" @click="isLogin = false">สมัครสมาชิก</div>
            </div>

            <van-field v-model="username" placeholder="ชื่อผู้ใช้" />
            <van-field v-model="password" type="password" placeholder="รหัสผ่าน" />
            
            <van-button block type="primary" @click="handleSubmit">
                {{ isLogin ? 'เข้าสู่ระบบ' : 'ลงทะเบียน' }}
            </van-button>

            <div class="footer-text" v-if="!isLogin">
                มีบัญชีอยู่แล้ว? <b>เข้าสู่ระบบที่นี่</b>
            </div>
        </div>
    </div>

    <script type="module">
        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const isLogin = ref(false); // เริ่มที่หน้าสมัครสมาชิกตามรูปพี่
                const username = ref('');
                const password = ref('');

                const handleSubmit = () => {
                    if(!username.value || !password.value) return vant.showFailToast('กรุณากรอกข้อมูล');
                    vant.showLoadingToast({ message: 'กำลังดำเนินการ...', forbidClick: true });
                    // ระบบจะเชื่อมต่อ Firebase อัตโนมัติเหมือนที่เคยตั้งไว้
                };

                return { isLogin, username, password, handleSubmit };
            }
        }).use(vant).mount('#app');
    </script>
</body>
</html>
