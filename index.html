<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Shop - Seller Center</title>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css"/>
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <style>
        /* เน้นความคลีนแบบแอปจริง */
        body { background-color: #ffffff; color: #161823; font-family: 'ProximaNova', sans-serif; margin: 0; }
        .van-nav-bar { background: #ffffff; border-bottom: 0.5px solid #ebebeb; }
        .van-nav-bar__title { font-weight: 800; font-size: 18px; color: #000; }
        
        .header-logo { text-align: center; padding: 40px 0 20px 0; }
        .header-logo img { width: 160px; }

        .auth-box { padding: 0 32px; }
        .tab-menu { display: flex; gap: 24px; margin-bottom: 24px; border-bottom: 1px solid #f2f2f2; }
        .tab-item { padding: 12px 0; font-size: 16px; color: #8a8b91; cursor: pointer; position: relative; }
        .tab-item.active { color: #161823; font-weight: 700; }
        .tab-item.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: #fe2c55; }

        /* ปรับแต่ง Input ให้เหมือนของจริง */
        .van-cell-group { border: none; }
        .van-field { background: #f8f8f8; border-radius: 4px; margin-bottom: 12px; padding: 12px 16px; border: 1px solid transparent; }
        .van-field:focus-within { border: 1px solid #d1d1d1; background: #fff; }
        
        /* ปุ่มสีแดง TikTok */
        .van-button--primary { background: #fe2c55; border: none; border-radius: 4px; height: 48px; font-size: 16px; font-weight: 700; margin-top: 10px; }
        
        .footer-links { text-align: center; margin-top: 40px; color: #8a8b91; font-size: 13px; }
        .footer-links span { color: #fe2c55; font-weight: 600; cursor: pointer; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf2BfaGTs6qQD3MO5tSZLLW-BuQFvDVwM",
            authDomain: "my-trading-db.firebaseapp.com",
            projectId: "my-trading-db",
            storageBucket: "my-trading-db.firebasestorage.app",
            messagingSenderId: "682968234759",
            appId: "1:682968234759:web:eb2978d1e4019b77cb23a2"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const mode = ref('register'); 
                const username = ref('');
                const password = ref('');
                const inviteCode = ref('');

                const handleAction = async () => {
                    if (!username.value || !password.value) return vant.showFailToast('กรุณากรอกข้อมูล');
                    
                    if (mode.value === 'register') {
                        vant.showLoadingToast({ message: 'กำลังลงทะเบียน...', forbidClick: true });
                        await setDoc(doc(db, "users", username.value), {
                            pass: password.value, balance: 0, status: 'pending'
                        });
                        vant.showSuccessToast('สมัครสำเร็จ! กรุณารออนุมัติ');
                        mode.value = 'login';
                    } else {
                        vant.showLoadingToast({ message: 'กำลังเข้าสู่ระบบ...', forbidClick: true });
                        const userSnap = await getDoc(doc(db, "users", username.value));
                        if (userSnap.exists() && userSnap.data().pass === password.value) {
                            if (userSnap.data().status === 'active') {
                                vant.showSuccessToast('เข้าสู่ระบบสำเร็จ');
                            } else {
                                vant.showDialog({ title: 'แจ้งเตือน', message: 'บัญชีอยู่ระหว่างการตรวจสอบข้อมูล' });
                            }
                        } else {
                            vant.showFailToast('ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
                        }
                    }
                };
                return { mode, username, password, inviteCode, handleAction };
            }
        }).use(vant).mount('#app');
    </script>
</head>
<body>
    <div id="app">
        <div class="header-logo">
            <img src="https://p16-va.lemon8cdn.com/tos-alisg-v-a3e477-sg/o8fA7I9AfEAnC7e8DAIBeAf8e9f2EAfADDAfA9~tplv-tej9nj120t-origin.webp" alt="TikTok Shop">
        </div>

        <div class="auth-box">
            <div class="tab-menu">
                <div class="tab-item" :class="{active: mode === 'login'}" @click="mode = 'login'">เข้าสู่ระบบ</div>
                <div class="tab-item" :class="{active: mode === 'register'}" @click="mode = 'register'">สมัครสมาชิก</div>
            </div>

            <van-field v-model="username" placeholder="ชื่อผู้ใช้" />
            <van-field v-model="password" type="password" placeholder="รหัสผ่าน" />
            
            <van-button block type="primary" @click="handleAction">
                {{ mode === 'register' ? 'ลงทะเบียน' : 'เข้าสู่ระบบ' }}
            </van-button>
        </div>

        <div class="footer-links">
            มีบัญชีอยู่แล้ว? <span @click="mode = 'login'">เข้าสู่ระบบที่นี่</span>
        </div>
    </div>
</body>
</html>
