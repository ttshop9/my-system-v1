<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TKSHOP - PREMIUM GLOBAL TRADING</title>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css"/>
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <style>
        body { background: #0b0e11; color: white; font-family: 'Inter', sans-serif; }
        .van-field { background: #1e2329; border-radius: 10px; margin-bottom: 12px; border: 1px solid #2d3845; }
        .van-field__control { color: white; }
        .van-button--primary { background: #f0b90b; border: none; color: black; font-weight: bold; border-radius: 10px; height: 48px; }
        .van-nav-bar { background: #0b0e11; border: none; }
        .van-nav-bar__title { color: #f0b90b; font-weight: bold; }
        .auth-box { padding: 25px; margin-top: 10px; }
        .lang-switch { position: absolute; right: 15px; top: 15px; z-index: 10; color: #f0b90b; font-size: 14px; }
        .header-logo { text-align: center; padding: 40px 0 20px 0; }
        .tab-menu { display: flex; gap: 20px; margin-bottom: 25px; font-size: 18px; color: #848e9c; }
        .tab-menu .active { color: white; border-bottom: 3px solid #f0b90b; padding-bottom: 5px; font-weight: bold; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBf2BfaGTs6qQD3MO5tSZLLW-BuQFvDVwM",
            authDomain: "my-trading-db.firebaseapp.com",
            projectId: "my-trading-db",
            storageBucket: "my-trading-db.firebasestorage.app",
            messagingSenderId: "682968234759",
            appId: "1:682968234759:web:eb2978d1e4019b77cb23a2"
        };
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const { createApp, ref } = Vue;
        createApp({
            setup() {
                const mode = ref('register'); 
                const username = ref('');
                const password = ref('');
                const inviteCode = ref('');

                const handleAction = async () => {
                    if (!username.value || !password.value) return vant.showFailToast('กรุณากรอกข้อมูล');
                    
                    if (mode.value === 'register') {
                        if (!inviteCode.value) return vant.showFailToast('ต้องมีรหัสแนะนำ');
                        vant.showLoadingToast({ message: 'กำลังลงทะเบียน...', forbidClick: true });
                        
                        // ตรวจสอบรหัสแนะนำ (VIP999)
                        const codeSnap = await getDoc(doc(db, "codes", inviteCode.value));
                        if (!codeSnap.exists()) return vant.showFailToast('รหัสแนะนำไม่ถูกต้อง');

                        await setDoc(doc(db, "users", username.value), {
                            pass: password.value, balance: 0, status: 'pending', code: inviteCode.value
                        });
                        vant.showSuccessToast('สมัครสำเร็จ! รอการตรวจสอบ');
                        mode.value = 'login';
                    } else {
                        vant.showLoadingToast({ message: 'กำลังเข้าสู่ระบบ...', forbidClick: true });
                        const userSnap = await getDoc(doc(db, "users", username.value));
                        if (userSnap.exists() && userSnap.data().pass === password.value) {
                            if (userSnap.data().status === 'active') {
                                vant.showSuccessToast('ยินดีต้อนรับ!');
                                // window.location.href = 'home.html';
                            } else {
                                vant.showDialog({ title: 'แจ้งเตือน', message: 'บัญชีอยู่ระหว่างตรวจสอบยอดเงินฝากเริ่มต้น' });
                            }
                        } else {
                            vant.showFailToast('ข้อมูลไม่ถูกต้อง');
                        }
                    }
                };
                return { mode, username, password, inviteCode, handleAction };
            }
        }).use(vant).mount('#app');
    </script>
</head>
<body>
    <div id="app">
        <div class="lang-switch"><van-icon name="points" /> English / ไทย</div>
        <div class="header-logo">
            <img src="https://cryptologos.cc/logos/binance-coin-bnb-logo.png" width="60">
            <h2 style="margin-top:10px;">TKSHOP PREMIUM</h2>
        </div>
        <div class="auth-box">
            <div class="tab-menu">
                <span :class="{active: mode === 'login'}" @click="mode = 'login'">เข้าสู่ระบบ</span>
                <span :class="{active: mode === 'register'}" @click="mode = 'register'">ลงทะเบียน</span>
            </div>
            <van-field v-model="username" placeholder="Username / Email" />
            <van-field v-model="password" type="password" placeholder="Password" />
            <van-field v-if="mode === 'register'" v-model="inviteCode" placeholder="Invitation Code (รหัสแนะนำ)" />
            <van-button block type="primary" @click="handleAction">{{ mode === 'register' ? 'สมัครสมาชิก' : 'เข้าสู่ระบบตอนนี้' }}</van-button>
            <p style="text-align:center; color:#848e9c; font-size:12px; margin-top:20px;">Global Secure Encryption Technology</p>
        </div>
    </div>
</body>
</html>
