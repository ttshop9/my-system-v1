<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TikTok Shop</title>
    <link rel="stylesheet" href="https://fastly.jsdelivr.net/npm/vant@4/lib/index.css"/>
    <script src="https://fastly.jsdelivr.net/npm/vue@3"></script>
    <script src="https://fastly.jsdelivr.net/npm/vant@4/lib/vant.min.js"></script>
    <style>
        body { background-color: #f7f8fa; margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
        .header-nav { background: #000; color: #fff; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: bold; font-size: 22px; }
        .red-text { color: #fe2c55; }
        
        /* การ์ดยอดเงินสีเทาดำแบบเดิม */
        .balance-card { 
            background: #333333; margin: 15px; padding: 25px; border-radius: 15px; color: #fff; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .label { font-size: 14px; opacity: 0.8; margin-bottom: 8px; }
        .amount { font-size: 36px; font-weight: bold; margin-bottom: 15px; }
        
        .btn-group { display: flex; gap: 10px; }
        .btn-action { padding: 8px 25px; border-radius: 20px; font-size: 14px; font-weight: bold; cursor: pointer; border: none; }
        .btn-action.white { background: #fff; color: #000; }
        .btn-action.red { background: #fe2c55; color: #fff; }
        
        .mission-card { background: #fff; margin: 0 15px 12px; padding: 18px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .m-icon-box { width: 45px; height: 45px; background: #fe2c55; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin-right: 12px; }
        .m-title { font-weight: bold; font-size: 15px; }
        .m-sub { font-size: 12px; color: #999; }
        .withdraw-notice { margin: 20px 15px; color: #ee0a24; font-size: 12px; line-height: 1.5; }
    </style>
</head>
<body>
    <div id="app">
        <div class="header-nav">
            <span class="logo">TikTok<span class="red-text">Shop</span></span>
            <van-icon name="setting-o" size="22"></van-icon>
        </div>

        <van-notice-bar left-icon="volume-o" text="ยินดีด้วยกับคุณบัญชี 089***45xx ถอนเงินสำเร็จ 15,000 บาท, คุณบัญชี 061***9xxx ถอนเงินสำเร็จ 8,200 บาท" scrollable></van-notice-bar>

        <div class="balance-card">
            <div class="label">ยอดเงินคงเหลือ (USD)</div>
            <div class="amount">$ {{ formatMoney(balance) }}</div>
            <div class="btn-group">
                <button class="btn-action white">เติมเงิน</button>
                <button class="btn-action red" @click="showWithdraw = true">ถอนเงิน</button>
            </div>
        </div>

        <van-grid :column-num="4" :border="false" style="margin-bottom: 10px;">
            <van-grid-item icon="notes-o" text="ประวัติงาน"></van-grid-item>
            <van-grid-item icon="idcard" text="กระเป๋าเงิน"></van-grid-item>
            <van-grid-item icon="friends-o" text="เชิญเพื่อน"></van-grid-item>
            <van-grid-item icon="info-o" text="เกี่ยวกับเรา"></van-grid-item>
        </van-grid>

        <div style="padding: 15px; font-weight: bold; color: #333;">ภารกิจวันนี้</div>
        <div v-for="i in 3" :key="i" class="mission-card">
            <div style="display: flex; align-items: center;">
                <div class="m-icon-box"><van-icon name="shopping-cart" color="#fff" size="22"></van-icon></div>
                <div>
                    <div class="m-title">ภารกิจโปรโมทสินค้าที่ {{i}}</div>
                    <div class="m-sub">ค่าคอมมิชชั่น: 15% - 25%</div>
                </div>
            </div>
            <van-button size="small" type="danger" round @click="showWithdraw = true">รับงาน</van-button>
        </div>

        <van-popup v-model:show="showWithdraw" position="bottom" round closeable :style="{ height: '75%' }">
            <div style="padding-top: 25px;">
                <h3 style="text-align: center; margin-bottom: 25px;">ถอนเงิน</h3>
                <van-cell-group inset>
                    <van-field v-model="form.name" label="ชื่อ-นามสกุล" placeholder="กรอกชื่อและนามสกุลจริง" input-align="right"></van-field>
                    <van-field v-model="form.bank" is-link readonly label="ธนาคาร" placeholder="เลือกธนาคาร" @click="showPicker = true" input-align="right"></van-field>
                    <van-field v-model="form.acc" label="เลขบัญชี" placeholder="ระบุเลขบัญชีธนาคาร" type="digit" input-align="right"></van-field>
                    <van-field v-model="form.amount" label="จำนวนเงิน" placeholder="ยอดเงินที่ต้องการถอน" type="number" input-align="right"></van-field>
                </van-cell-group>
                <div class="withdraw-notice">* หมายเหตุ: การถอนเงินอาจใช้เวลา 15-30 นาทีในการตรวจสอบความถูกต้อง</div>
                <div style="padding: 20px;">
                    <van-button block color="#000" round @click="submit" style="height: 48px; font-weight: bold;">ยืนยันการถอนเงิน</van-button>
                </div>
            </div>
        </van-popup>

        <van-popup v-model:show="showPicker" position="bottom" round>
            <van-picker title="เลือกธนาคาร" :columns="banks" @confirm="onConfirm" @cancel="showPicker = false"></van-picker>
        </van-popup>

        <van-tabbar active-color="#fe2c55">
            <van-tabbar-item icon="home-o">หน้าแรก</van-tabbar-item>
            <van-tabbar-item icon="description-o">ภารกิจ</van-tabbar-item>
            <van-tabbar-item icon="contact-o">ข้อมูลส่วนตัว</van-tabbar-item>
        </van-tabbar>
    </div>

    <script>
        const { createApp, ref } = Vue;
        const app = createApp({
            setup() {
                const balance = ref(1540.00);
                const showWithdraw = ref(false);
                const showPicker = ref(false);
                const form = ref({ name: '', bank: '', acc: '', amount: '' });
                const banks = [{ text: 'กสิกรไทย' }, { text: 'ไทยพาณิชย์' }, { text: 'กรุงไทย' }, { text: 'กรุงเทพ' }, { text: 'ออมสิน' }];

                const formatMoney = (v) => v.toFixed(2).replace(/\d(?=(\d{3})+\.)/g, '$&,');
                const onConfirm = ({ selectedOptions }) => { form.value.bank = selectedOptions[0].text; showPicker.value = false; };
                const submit = () => {
                    if(!form.value.name || !form.value.bank || !form.value.acc || !form.value.amount) return vant.showToast('กรุณากรอกข้อมูลให้ครบ');
                    vant.showDialog({ title: 'สำเร็จ', message: 'ส่งคำขอแล้ว โปรดรอตรวจสอบ 15-30 นาที' });
                    showWithdraw.value = false;
                };

                return { balance, showWithdraw, showPicker, form, banks, formatMoney, onConfirm, submit };
            }
        });
        app.use(vant);
        app.mount('#app');
    </script>
</body>
</html>
